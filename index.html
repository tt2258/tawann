<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>MY IDENTITY • ตัวตนของฉัน</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #fff9f7 0%, #ffe9f0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', 'Sarabun', 'Kanit', sans-serif;
            padding: 20px;
            margin: 0;
            animation: bgGlow 8s ease-in-out infinite alternate;
        }

        @keyframes bgGlow {
            0% { background: linear-gradient(145deg, #fff9f7, #ffe9f0); }
            100% { background: linear-gradient(145deg, #ffe9f5, #ffd9e8); }
        }

        .box {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid rgba(255, 182, 193, 0.6);
            padding: 40px 50px;
            border-radius: 40px 16px 40px 16px;
            box-shadow: 0 25px 40px -10px rgba(255, 105, 135, 0.3),
                        0 0 0 1px rgba(255, 230, 240, 0.9) inset,
                        0 10px 30px -5px rgba(255, 200, 220, 0.5);
            display: inline-block;
            max-width: 600px;
            width: 100%;
            transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            animation: float 6s ease-in-out infinite;
        }

        .box:hover {
            transform: scale(1.01) translateY(-5px);
            box-shadow: 0 35px 50px -10px rgba(255, 120, 150, 0.4),
                        0 0 0 2px rgba(255, 200, 220, 0.8) inset;
            border-color: #ffb0c0;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        h1 {
            color: #b3405a;
            font-weight: 500;
            font-size: 2.6rem;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-shadow: 0 2px 10px rgba(255, 160, 180, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        h1::before, h1::after {
            content: "🌸";
            font-size: 2rem;
            opacity: 0.8;
            filter: drop-shadow(0 2px 5px #ffb6c1);
        }

        h1::after {
            content: "✨";
        }

        #text {
            color: #5e3a44;
            font-size: 1.8rem;
            line-height: 1.5;
            margin-top: 20px;
            padding: 25px 20px;
            background: rgba(255, 240, 245, 0.7);
            border-radius: 30px 10px 30px 10px;
            border: 1px dashed #ffb8c9;
            box-shadow: 0 5px 15px rgba(255, 200, 220, 0.4), inset 0 0 20px #fff0f5;
            font-weight: 400;
            word-break: break-word;
            transition: 0.3s;
            font-family: 'Sarabun', 'Kanit', cursive;
            backdrop-filter: blur(4px);
        }

        #text:hover {
            background: rgba(255, 245, 250, 0.8);
            border-color: #ff99aa;
            box-shadow: 0 8px 20px rgba(255, 150, 180, 0.5);
        }

        /* เครื่องหมายอัญประกาศสวยๆ */
        #text::before {
            content: "“";
            font-size: 3rem;
            color: #ffa5b9;
            display: block;
            line-height: 0.5;
            opacity: 0.5;
            font-family: serif;
            margin-bottom: -5px;
        }

        #text::after {
            content: "”";
            font-size: 3rem;
            color: #ffa5b9;
            display: block;
            line-height: 0.3;
            opacity: 0.5;
            font-family: serif;
            text-align: right;
            margin-top: 5px;
        }

        /* ดาวตก / 装饰 */
        .deco {
            position: fixed;
            pointer-events: none;
            font-size: 2rem;
            opacity: 0.25;
            animation: sparkle 5s infinite alternate;
            z-index: -1;
        }

        @keyframes sparkle {
            0% { opacity: 0.1; transform: scale(1); }
            100% { opacity: 0.4; transform: scale(1.1); }
        }

        .deco-1 { top: 5%; left: 3%; animation-delay: 0s; }
        .deco-2 { top: 15%; right: 6%; animation-delay: 1s; }
        .deco-3 { bottom: 8%; left: 7%; animation-delay: 2s; }
        .deco-4 { bottom: 20%; right: 4%; animation-delay: 3s; }

        /* Responsive */
        @media (max-width: 480px) {
            h1 { font-size: 2rem; }
            #text { font-size: 1.4rem; }
            .box { padding: 30px 20px; }
        }

        /* โหลดข้อมูลสำเร็จ / ล้มเหลว ใส่เอฟเฟกต์นิดหน่อย */
        #text.error {
            color: #b0003a;
            background: #ffe2e8;
        }
    </style>
</head>
<body>
    <!-- กลิ่นอายหวาน ด้วยของตกแต่งรอบๆ -->
    <div class="deco deco-1">🍰</div>
    <div class="deco deco-2">🧁</div>
    <div class="deco deco-3">🍬</div>
    <div class="deco deco-4">🍭</div>

    <div class="box">
        <h1>MY IDENTITY 💲</h1>
        <div id="text">กำลังดึงข้อมูล...</div>
    </div>

    <script>
        // ระบบดึงข้อมูลจากไฟล์ JSON ที่บอสเพิ่งสร้าง (ไม่มีการเปลี่ยนแปลงใดๆ)
        fetch('data.json')
            .then(res => res.json())
            .then(data => {
                document.getElementById('text').innerText = data.diary;
            })
            .catch(err => { 
                document.getElementById('text').innerText = "โหลดข้อมูลไม่สำเร็จ";
                document.getElementById('text').classList.add('error');
            });
    </script>
</body>
</html>
