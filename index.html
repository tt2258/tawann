<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDENTITY - ตัวตนของฉัน</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #000000, #1a0000, #2a0000);
            color: #ff0000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Kanit', 'Sarabun', sans-serif;
            position: relative;
            overflow-x: hidden;
        }

        /* เอฟเฟกต์แสงเรืองๆ */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 50% 50%, rgba(255, 0, 0, 0.15) 0%, transparent 60%);
            pointer-events: none;
            animation: pulse 4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* อนุภาคไฟแดงลอยอยู่ */
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #ff0000;
            border-radius: 50%;
            filter: blur(1px);
            opacity: 0.5;
            animation: float 6s infinite;
        }

        @keyframes float {
            0% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-100vh) translateX(100px); opacity: 0; }
        }

        /* สร้างอนุภาคหลายๆ จุด */
        .particle:nth-child(1) { left: 10%; top: 10%; animation-duration: 8s; }
        .particle:nth-child(2) { left: 20%; top: 30%; animation-duration: 10s; }
        .particle:nth-child(3) { left: 30%; top: 50%; animation-duration: 7s; }
        .particle:nth-child(4) { left: 40%; top: 70%; animation-duration: 9s; }
        .particle:nth-child(5) { left: 50%; top: 20%; animation-duration: 11s; }
        .particle:nth-child(6) { left: 60%; top: 40%; animation-duration: 8s; }
        .particle:nth-child(7) { left: 70%; top: 60%; animation-duration: 10s; }
        .particle:nth-child(8) { left: 80%; top: 80%; animation-duration: 9s; }
        .particle:nth-child(9) { left: 90%; top: 15%; animation-duration: 7s; }
        .particle:nth-child(10) { left: 15%; top: 85%; animation-duration: 12s; }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        .box {
            border: 3px solid #ff0000;
            padding: 40px 30px;
            border-radius: 30px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.3),
                        0 0 100px rgba(255, 0, 0, 0.2),
                        inset 0 0 20px rgba(255, 0, 0, 0.2);
            text-align: center;
            position: relative;
            overflow: hidden;
            animation: boxGlow 3s ease-in-out infinite;
        }

        @keyframes boxGlow {
            0%, 100% { box-shadow: 0 0 50px rgba(255, 0, 0, 0.3), 0 0 100px rgba(255, 0, 0, 0.2), inset 0 0 20px rgba(255, 0, 0, 0.2); }
            50% { box-shadow: 0 0 70px rgba(255, 0, 0, 0.5), 0 0 150px rgba(255, 0, 0, 0.3), inset 0 0 30px rgba(255, 0, 0, 0.3); }
        }

        /* เส้นขอบวิ่ง */
        .box::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #ff0000, #ff6a00, #ff0000, #ff6a00, #ff0000);
            background-size: 400% 400%;
            border-radius: 30px;
            z-index: -1;
            filter: blur(10px);
            opacity: 0.5;
            animation: borderGlow 6s ease infinite;
        }

        @keyframes borderGlow {
            0%, 100% { background-position: 0% 50%; opacity: 0.5; }
            50% { background-position: 100% 50%; opacity: 0.8; }
        }

        h1 {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 20px #ff0000,
                         0 0 40px #ff0000,
                         2px 2px 0 #8b0000;
            animation: titleFlicker 3s infinite;
            background: linear-gradient(135deg, #ff0000, #ff6a00, #ff0000);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            position: relative;
            display: inline-block;
        }

        h1 i {
            margin: 0 10px;
            font-size: 40px;
            color: #ff0000;
            animation: iconSpin 10s linear infinite;
        }

        @keyframes iconSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes titleFlicker {
            0%, 100% { opacity: 1; }
            95% { opacity: 1; }
            96% { opacity: 0.8; }
            97% { opacity: 1; }
            98% { opacity: 0.6; }
            99% { opacity: 1; }
        }

        .display-area {
            margin: 40px 0;
            padding: 30px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255, 0, 0, 0.3);
            border-radius: 20px;
            position: relative;
        }

        .display-area::before {
            content: '"';
            position: absolute;
            top: -20px;
            left: 20px;
            font-size: 80px;
            color: rgba(255, 0, 0, 0.2);
            font-family: serif;
        }

        .display-area::after {
            content: '"';
            position: absolute;
            bottom: -40px;
            right: 20px;
            font-size: 80px;
            color: rgba(255, 0, 0, 0.2);
            font-family: serif;
        }

        #text {
            color: #00ff00;
            font-size: 28px;
            line-height: 1.6;
            font-weight: 500;
            font-family: 'Sarabun', sans-serif;
            text-shadow: 0 0 10px #00ff00,
                         0 0 20px #00ff00;
            word-wrap: break-word;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: textPulse 2s ease-in-out infinite;
            position: relative;
            z-index: 2;
        }

        @keyframes textPulse {
            0%, 100% { text-shadow: 0 0 10px #00ff00, 0 0 20px #00ff00; }
            50% { text-shadow: 0 0 20px #00ff00, 0 0 40px #00ff00, 0 0 60px #00ff00; }
        }

        .loading {
            display: inline-block;
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 0, 0, 0.3);
            border-radius: 50%;
            border-top-color: #ff0000;
            animation: spin 1s ease-in-out infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .status-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0 10px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
        }

        .status-bar span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status-bar i {
            color: #ff0000;
        }

        .glitch {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 0, 0, 0.1);
            pointer-events: none;
            animation: glitchEffect 0.3s infinite;
            opacity: 0;
        }

        @keyframes glitchEffect {
            0%, 100% { opacity: 0; }
            95% { opacity: 0.1; transform: skew(0deg); }
            96% { opacity: 0.1; transform: skew(10deg); }
            97% { opacity: 0.1; transform: skew(-10deg); }
            98% { opacity: 0.1; transform: skew(5deg); }
            99% { opacity: 0.1; transform: skew(-5deg); }
        }

        footer {
            margin-top: 40px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 14px;
            letter-spacing: 2px;
        }

        footer i {
            color: #ff0000;
            animation: heartbeat 1.5s ease infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 {
                font-size: 32px;
                letter-spacing: 2px;
            }
            
            #text {
                font-size: 20px;
            }
            
            .box {
                padding: 20px;
            }
        }

        /* เส้นเรืองแสงเพิ่มเติม */
        .glow-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ff0000, transparent);
            bottom: 0;
            left: 0;
            animation: slideGlow 3s linear infinite;
        }

        @keyframes slideGlow {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
    </style>
</head>
<body>
    <!-- สร้างอนุภาค -->
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>

    <div class="container">
        <div class="box">
            <!-- เอฟเฟกต์กลิทช์ -->
            <div class="glitch"></div>
            
            <!-- หัวข้อ -->
            <h1>
                <i class="fas fa-skull"></i>
                MY IDENTITY
                <i class="fas fa-crown"></i>
            </h1>
            
            <!-- พื้นที่แสดงข้อมูล -->
            <div class="display-area">
                <div id="text">
                    <div class="loading"></div>
                    <span style="margin-left: 15px;">กำลังดึงข้อมูล...</span>
                </div>
            </div>
            
            <!-- สถานะ -->
            <div class="status-bar">
                <span>
                    <i class="fas fa-shield-alt"></i>
                    SECURE CONNECTION
                </span>
                <span>
                    <i class="fas fa-database"></i>
                    SOURCE: data.json
                </span>
                <span>
                    <i class="fas fa-lock"></i>
                    ENCRYPTED
                </span>
            </div>
            
            <!-- เส้นเรืองแสง -->
            <div class="glow-line"></div>
        </div>
        
        <footer>
            <i class="fas fa-heart"></i> IDENTITY VERIFICATION SYSTEM <i class="fas fa-heart"></i>
        </footer>
    </div>

    <script>
        // ระบบดึงข้อมูลจากไฟล์ JSON ที่บอสเพิ่งสร้าง
        fetch('data.json')
            .then(res => {
                if (!res.ok) {
                    throw new Error('Network response was not ok');
                }
                return res.json();
            })
            .then(data => {
                // ซ่อน loading และแสดงข้อมูล
                const textElement = document.getElementById('text');
                textElement.innerHTML = ''; // ล้าง loading
                
                // เพิ่มเอฟเฟกต์พิมพ์ทีละตัวอักษร
                const diaryText = data.diary;
                let i = 0;
                
                function typeWriter() {
                    if (i < diaryText.length) {
                        textElement.innerHTML += diaryText.charAt(i);
                        i++;
                        setTimeout(typeWriter, 50);
                    }
                }
                
                typeWriter();
            })
            .catch(err => { 
                document.getElementById('text').innerHTML = '⚠️ โหลดข้อมูลไม่สำเร็จ ⚠️'; 
                console.error('Error:', err);
            });
    </script>
</body>
</html>
